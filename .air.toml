root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/galactica"
  cmd = "CGO_ENABLED=0 go build -o ./tmp/galactica ./cmd/galactica"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "web/node_modules", "internal/server/dist"]
  include_ext = ["go", "yaml"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = false

[log]
  time = false

[screen]
  clear_on_rebuild = false
