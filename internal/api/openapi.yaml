# internal/api/openapi.yaml
openapi: "3.1.0"
info:
  title: Galactica API
  version: "0.1.0"
  description: |
    Galactica — mission control for a self-hosted media stack.
    Phase 1 exposes ops endpoints only; feature endpoints land with each Phase 2+ feature.
servers:
  - url: /api/v1
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:  { type: string }
                  version: { type: string }
                  db:      { type: string }
  /version:
    get:
      summary: Version info
      operationId: getVersion
      responses:
        "200":
          description: Build version metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  commit:  { type: string }
                  date:    { type: string }
  /readyz:
    get:
      summary: Readiness probe
      operationId: getReadyz
      responses:
        "200": { description: Service is ready }
        "503": { description: Service not ready }
